      for (const month in grouped) {
        const [year, mon] = month.split('-');
        html += `<div class="month-group">
          <div class="month-title">${year}年${parseInt(mon)}月</div>`;

        grouped[month].forEach(d => {
          const date = new Date(d.date);
          const dayOfWeek = date.getDay();
          const dayNum = d.date.split('-')[2];

          html += `<div class="digest-item" data-index="${d.index}" onclick="loadDigest(${d.index})">
            <span class="digest-dot ${dotClasses[dayOfWeek]}"></span>
            <span class="digest-date">${parseInt(dayNum)}日</span>
            <span class="digest-weekday">周${weekdays[dayOfWeek]}</span>
          </div>`;
        });

        html += '</div>';
      }

      container.innerHTML = html;
      document.getElementById('totalCount').textContent = digests.length;
    }

    // 更新最新日报徽章
    function updateLatestBadge() {
      if (digests.length > 0) {
        const latest = digests[0].date;
        const [y, m, d] = latest.split('-');
        document.getElementById('latestDate').textContent = `${parseInt(m)}/${parseInt(d)}`;
      }
    }

    // 加载指定日报
    function loadDigest(index) {
      if (index < 0 || index >= digests.length) return;

      currentIndex = index;
      const digest = digests[index];

      // 更新选中状态
      document.querySelectorAll('.digest-item').forEach((el, i) => {
        el.classList.toggle('active', parseInt(el.dataset.index) === index);
      });

      // 更新标题
      const date = new Date(digest.date);
      document.getElementById('currentDate').textContent =
        `${digest.date} 周${weekdays[date.getDay()]}`;

      // 更新导航按钮
      document.getElementById('prevBtn').disabled = index >= digests.length - 1;
      document.getElementById('nextBtn').disabled = index <= 0;

      // 加载 iframe
      const container = document.getElementById('iframeContainer');
      document.getElementById('emptyState')?.remove();

      // 显示加载状态
      document.getElementById('loading').classList.add('show');

      let iframe = container.querySelector('iframe');
      if (!iframe) {
        iframe = document.createElement('iframe');
        container.appendChild(iframe);
      }

      iframe.onload = () => {
        document.getElementById('loading').classList.remove('show');
        // 同步主题到 iframe（postMessage 兼容 file:// 协议）
        const currentTheme = document.documentElement.getAttribute('data-theme');
        try {
          iframe.contentWindow.postMessage({ type: 'pusa-theme', theme: currentTheme }, '*');
        } catch(e) {}
      };
      iframe.src = digest.file;

      // 移动端关闭侧边栏
      closeSidebar();
    }

    // 加载最新日报
    function loadLatest() {
      if (digests.length > 0) {
        loadDigest(0);
      }
    }

    // 加载前一天
    function loadPrev() {
      if (currentIndex < digests.length - 1) {
        loadDigest(currentIndex + 1);
      }
    }

    // 加载后一天
    function loadNext() {
      if (currentIndex > 0) {
        loadDigest(currentIndex - 1);
      }
    }

    // 侧边栏收缩
    function toggleCollapse() {
      const sidebar = document.getElementById('sidebar');
      sidebar.classList.toggle('collapsed');
      // 保存状态到 localStorage
      localStorage.setItem('sidebarCollapsed', sidebar.classList.contains('collapsed'));
    }

    // 恢复侧边栏状态
    function restoreSidebarState() {
      const collapsed = localStorage.getItem('sidebarCollapsed') === 'true';
      if (collapsed) {
        document.getElementById('sidebar').classList.add('collapsed');
      }
    }

    // 侧边栏切换（移动端）
    function toggleSidebar() {
      document.getElementById('sidebar').classList.toggle('open');
      document.getElementById('overlay').classList.toggle('show');
    }

    function closeSidebar() {
      document.getElementById('sidebar').classList.remove('open');
      document.getElementById('overlay').classList.remove('show');
    }

    // 键盘快捷键
    document.addEventListener('keydown', (e) => {
      if (e.key === 'ArrowLeft') loadPrev();
      if (e.key === 'ArrowRight') loadNext();
      if (e.key === 'Home') loadLatest();
    });

    // 启动
    restoreSidebarState();
    init();
  </script>
  <script>
    /* ── 主题切换 ── */
    (function () {
      const saved = localStorage.getItem('pusa-theme') || 'dark';
      /* data-theme 已在 <head> IIFE 设置，这里只更新按钮图标 */
      document.addEventListener('DOMContentLoaded', function () {
        const btn = document.getElementById('themeToggle');
        if (btn) btn.textContent = saved === 'dark' ? '☀️ 明亮' : '🌙 暗黑';
      });
    })();
    function toggleTheme() {
      const html = document.documentElement;
      const next = html.getAttribute('data-theme') === 'dark' ? 'light' : 'dark';
      html.setAttribute('data-theme', next);
      localStorage.setItem('pusa-theme', next);
      const btn = document.getElementById('themeToggle');
      if (btn) btn.textContent = next === 'dark' ? '☀️ 明亮' : '🌙 暗黑';
      // 用 postMessage 同步 iframe（兼容 file:// 协议）
      const iframe = document.querySelector('#iframeContainer iframe');
      if (iframe && iframe.contentWindow) {
        try {
          iframe.contentWindow.postMessage({ type: 'pusa-theme', theme: next }, '*');
        } catch(e) {}
      }
    }
  </script>
</body>
</html>
