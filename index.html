    // 渲染日报列表
    function renderDigests() {
      const list = document.getElementById('digestList');
      const totalDigestsEl = document.getElementById('totalDigests');
      const lastUpdatedEl = document.getElementById('lastUpdated');
      const totalMessagesEl = document.getElementById('totalMessages');

      // 更新统计
      totalDigestsEl.textContent = digests.length;
      lastUpdatedEl.textContent = digests[0]?.date || '-';
      totalMessagesEl.textContent = digests.reduce((sum, d) => sum + (d.messageCount || 0), 0);

      // 渲染列表
      list.innerHTML = digests.map((d, i) => `
        <div class="digest-card" onclick="openDigest('${d.file}')" style="animation: fadeIn 0.5s ${i * 0.1}s both;">
          <div class="digest-date">
            📅 ${formatDate(d.date)}${i === 0 ? '<span class="badge badge-new">NEW</span>' : ''}
          </div>
          <div class="digest-title">${d.title}</div>
          <div class="digest-meta">
            <span>💬 ${d.messageCount || 0} 条消息</span>
            <span>👥 ${d.speakerCount || 0} 人发言</span>
          </div>
        </div>
      `).join('');
    }

    // 格式化日期
    function formatDate(dateStr) {
      const date = new Date(dateStr);
      const weekDays = ['周日', '周一', '周二', '周三', '周四', '周五', '周六'];
      return `${date.getMonth() + 1}月${date.getDate()}日 ${weekDays[date.getDay()]}`;
    }

    // 打开日报
    function openDigest(file) {
      window.open('DailyNews/' + file, '_blank');
    }

    // 主题切换
    const themeToggle = document.getElementById('themeToggle');
    let isDark = localStorage.getItem('pusa-theme') !== 'light';

    function applyTheme() {
      document.documentElement.setAttribute('data-theme', isDark ? 'dark' : 'light');
      themeToggle.textContent = isDark ? '🌙' : '☀️';
      if (!isDark) {
        document.documentElement.style.setProperty('--bg-primary', '#f5f3ee');
        document.documentElement.style.setProperty('--bg-card', '#ffffff');
        document.documentElement.style.setProperty('--bg-card-hover', '#f0f0f0');
        document.documentElement.style.setProperty('--border', '#e0e0e0');
        document.documentElement.style.setProperty('--text-primary', '#333333');
        document.documentElement.style.setProperty('--text-secondary', '#666666');
      } else {
        document.documentElement.style.removeProperty('--bg-primary');
        document.documentElement.style.removeProperty('--bg-card');
        document.documentElement.style.removeProperty('--bg-card-hover');
        document.documentElement.style.removeProperty('--border');
        document.documentElement.style.removeProperty('--text-primary');
        document.documentElement.style.removeProperty('--text-secondary');
      }
    }

    themeToggle.addEventListener('click', () => {
      isDark = !isDark;
      localStorage.setItem('pusa-theme', isDark ? 'dark' : 'light');
      applyTheme();
    });

    // 初始化
    applyTheme();
    renderDigests();

    // 淡入动画
    const style = document.createElement('style');
    style.textContent = `
      @keyframes fadeIn {
        from { opacity: 0; transform: translateY(10px); }
        to { opacity: 1; transform: translateY(0); }
      }
    `;
    document.head.appendChild(style);
  </script>
