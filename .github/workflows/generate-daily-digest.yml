name: Generate Daily Digest

on:
  # 手动触发
  workflow_dispatch:
    inputs:
      date:
        description: '目标日期 (YYYY-MM-DD，留空则使用昨天)'
        required: false
        type: string

  # 自动触发：当 data/ 目录下有新的 raw-*.json 文件被推送时
  push:
    paths:
      - 'data/raw-*.json'

jobs:
  generate-digest:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0  # 获取完整历史，便于 git 操作

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Determine target date
        id: date
        run: |
          if [ -n "${{ github.event.inputs.date }}" ]; then
            echo "target_date=${{ github.event.inputs.date }}" >> $GITHUB_OUTPUT
          else
            # 使用昨天的日期
            echo "target_date=$(date -d 'yesterday' +%Y-%m-%d)" >> $GITHUB_OUTPUT
          fi

      - name: Generate daily digest
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          ANTHROPIC_BASE_URL: ${{ secrets.ANTHROPIC_BASE_URL }}
          ANTHROPIC_MODEL_ID: ${{ secrets.ANTHROPIC_MODEL_ID }}
          TARGET_DATE: ${{ steps.date.outputs.target_date }}
        run: |
          node .github/scripts/generate-digest-cloud.js

      - name: Commit and push
        run: |
          git config user.name "GitHub Actions Bot"
          git config user.email "actions@github.com"

          # 添加生成的文件
          git add DailyNews/daily-*.html DailyNews/raw-*.txt

          # 检查是否有变更
          if git diff --staged --quiet; then
            echo "没有新的日报生成"
            exit 0
          fi

          # 提交并推送
          COMMIT_MSG="📰 日报 ${{ steps.date.outputs.target_date }}"
          git commit -m "$COMMIT_MSG"
          git push
