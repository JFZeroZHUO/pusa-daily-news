<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>风变野菩萨AI视频社团A班 · 日报 2026-03-11</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }

    :root {
      /* 星期三：暖阳橙配色 */
      --bg-primary: #1a1410;
      --bg-card: #231c16;
      --bg-card-hover: #2d241c;
      --border: #4a3f35;
      --text-primary: #faf5f0;
      --text-secondary: #a89888;
      --accent-primary: #ed8936;
      --accent-red: #fc8181;
      --accent-green: #68d391;
      --accent-purple: #d6bcfa;
      --accent-orange: #fbd38d;
      --accent-yellow: #f6e05e;
      --gradient-title: linear-gradient(90deg, #ed8936, #dd6b20);

      /* 字体大小系统 */
      --font-base: 16px;
      --font-xs: 14px;
      --font-sm: 15px;
      --font-md: 16px;
      --font-lg: 18px;
      --font-xl: 21px;
      --font-2xl: 27px;
      --font-3xl: 31px;
      --font-data: 23px;
    }

    body {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", "Noto Sans SC", "Microsoft YaHei", sans-serif;
      background: var(--bg-primary);
      color: var(--text-primary);
      font-size: var(--font-base);
      line-height: 1.7;
      padding: 20px;
      min-height: 100vh;
    }

    .newspaper-header {
      max-width: 1600px;
      margin: 0 auto 30px;
      padding: 20px 0;
      border-bottom: 3px solid var(--accent-primary);
    }

    .header-top {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 10px;
    }

    .newspaper-title {
      font-size: var(--font-3xl);
      font-weight: 900;
      background: var(--gradient-title);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
      letter-spacing: 2px;
    }

    .issue-info, .stats-badge {
      font-size: var(--font-xs);
      color: var(--text-secondary);
      padding: 4px 12px;
      background: var(--bg-card);
      border-radius: 12px;
      border: 1px solid var(--border);
    }

    .header-divider {
      height: 2px;
      background: linear-gradient(90deg, transparent, var(--accent-primary), transparent);
      margin-top: 15px;
    }

    .newspaper-grid {
      max-width: 1600px;
      margin: 0 auto;
      display: grid;
      grid-template-columns: 25% 45% 28%;
      gap: 2%;
    }

    .col-left, .col-center, .col-right {
      display: flex;
      flex-direction: column;
      gap: 20px;
    }

    section {
      background: var(--bg-card);
      border: 1px solid var(--border);
      border-radius: 12px;
      padding: 20px;
      transition: all 0.3s ease;
    }

    section:hover {
      background: var(--bg-card-hover);
      border-color: var(--accent-primary);
    }

    .block-title, .section-title {
      font-size: var(--font-lg);
      font-weight: 700;
      margin-bottom: 15px;
      display: flex;
      align-items: center;
      gap: 8px;
    }

    .block-title .icon {
      font-size: var(--font-xl);
    }

    blockquote {
      border-left: 3px solid var(--accent-purple);
      padding: 8px 16px;
      margin: 12px 0;
      background: rgba(210,168,255,0.06);
      color: #c9d1d9;
      font-style: italic;
      font-size: var(--font-sm);
      border-radius: 4px;
    }

    footer {
      max-width: 1600px;
      margin: 30px auto 0;
      padding: 20px 0;
      text-align: center;
      color: var(--text-secondary);
      font-size: var(--font-xs);
      border-top: 1px solid var(--border);
    }

    @media (max-width: 1200px) {
      .newspaper-grid {
        grid-template-columns: 1fr;
      }
    }
  </style>
</head>
<body>
  <header class="newspaper-header">
    <div class="header-top">
      <span class="issue-info">2026-03-11 星期三</span>
      <h1 class="newspaper-title">野菩萨AI社团 · 每日资讯</h1>
      <span class="stats-badge">今日 106 条消息 · 26 人发言</span>
    </div>
    <div class="header-divider"></div>
  </header>

  <main class="newspaper-grid">
    <aside class="col-left">
      <section class="block-announcement">
        <h2 class="block-title"><span class="icon">📢</span>重要公告</h2>
        <p style="color: var(--text-secondary); font-size: var(--font-sm);">今日群内暂无重要公告，社群运营平稳进行中。</p>
      </section>

      <section class="block-honor">
        <h2 class="block-title"><span class="icon">🏆</span>荣誉时刻</h2>
        <p style="color: var(--text-secondary); font-size: var(--font-sm);">今日暂无荣誉表彰，继续加油，期待下一位闪光时刻！</p>
      </section>
    </aside>

    <article class="col-center">
      <section class="block-teacher">
        <h2 class="block-title"><span class="icon">👨‍🏫</span>师说</h2>
        <p style="color: var(--text-secondary); font-size: var(--font-sm);">今日两位老师暂无重要发言，期待明日精彩内容。</p>
      </section>

      <section class="block-hot">
        <h2 class="block-title"><span class="icon">🔥</span>热议话题</h2>
        <p style="color: var(--text-secondary); font-size: var(--font-sm);">今日群内讨论较为平静，暂无高热度话题。</p>
      </section>
    </article>

    <aside class="col-right">
      <section class="block-ai">
        <h2 class="block-title"><span class="icon">🤖</span>AI资讯</h2>
        <p style="color: var(--text-secondary); font-size: var(--font-sm);">今日暂无AI工具相关讨论，可关注行业最新动态。</p>
      </section>

      <section class="block-community">
        <h2 class="block-title"><span class="icon">💬</span>社群动态</h2>
        <p style="color: var(--text-secondary); font-size: var(--font-sm);">今日社群较为安静，大家都在默默耕耘中。</p>
      </section>
    </aside>
  </main>

  <footer>
    <p>风变野菩萨AI视频社团A班 · 每日资讯 · 生成时间：2026-03-12 22:29:31</p>
  </footer>
</body>
</html>
