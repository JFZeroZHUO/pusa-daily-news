<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>风变野菩萨AI视频社团A班 · 资讯中心</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }

        :root {
            --primary: #2c3e50;
            --accent: #e67e22;
            --bg: #f5f5f5;
            --card-bg: #fff;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', 'PingFang SC', 'Microsoft YaHei', sans-serif;
            background: var(--bg);
            color: #333;
            line-height: 1.8;
            padding: 24px;
        }

        .container {
            max-width: 800px;
            margin: 0 auto;
            background: var(--card-bg);
            border-radius: 16px;
            box-shadow: 0 4px 40px rgba(0,0,0,0.08);
            overflow: hidden;
        }

        header {
            background: linear-gradient(135deg, var(--primary) 0%, #34495e 50%, var(--accent) 100%);
            color: #fff;
            padding: 56px 40px;
            text-align: center;
            position: relative;
            overflow: hidden;
        }

        header::before {
            content: '';
            position: absolute;
            top: -50%;
            right: -20%;
            width: 400px;
            height: 400px;
            background: rgba(255,255,255,0.1);
            border-radius: 50%;
        }

        header h1 {
            font-size: 30px;
            font-weight: 800;
            letter-spacing: 2px;
            position: relative;
            z-index: 1;
        }

        header p {
            margin-top: 12px;
            opacity: 0.9;
            font-size: 16px;
            position: relative;
            z-index: 1;
        }

        main { padding: 40px; }

        .section-title {
            font-size: 20px;
            color: var(--primary);
            margin-bottom: 24px;
            padding-bottom: 12px;
            border-bottom: 2px solid var(--accent);
            font-weight: 700;
        }

        .digest-list {
            list-style: none;
        }

        .digest-list li {
            margin-bottom: 16px;
        }

        .digest-list a {
            display: block;
            background: linear-gradient(135deg, #f8f9fa 0%, #fff 100%);
            border-radius: 12px;
            padding: 24px;
            text-decoration: none;
            color: #333;
            transition: all 0.3s ease;
            border: 1px solid #eee;
            position: relative;
            overflow: hidden;
        }

        .digest-list a::before {
            content: '';
            position: absolute;
            left: 0;
            top: 0;
            bottom: 0;
            width: 4px;
            background: var(--accent);
            border-radius: 12px 0 0 12px;
        }

        .digest-list a:hover {
            box-shadow: 0 8px 24px rgba(0,0,0,0.12);
            transform: translateX(6px);
        }

        .digest-list .date {
            font-size: 18px;
            font-weight: 700;
            color: var(--primary);
            display: block;
            margin-bottom: 8px;
        }

        .digest-list .desc {
            font-size: 14px;
            color: #666;
            line-height: 1.6;
        }

        .digest-list .stats {
            display: flex;
            gap: 16px;
            margin-top: 12px;
            font-size: 13px;
            color: #999;
        }

        .digest-list .stats span {
            background: rgba(230, 126, 34, 0.1);
            color: var(--accent);
            padding: 4px 12px;
            border-radius: 12px;
        }

        footer {
            background: var(--primary);
            color: #fff;
            text-align: center;
            padding: 32px;
            font-size: 14px;
        }

        @media (max-width: 600px) {
            header { padding: 40px 24px; }
            main { padding: 24px; }
            header h1 { font-size: 22px; }
        }
    </style>
</head>
<body>
    <div class="container">
        <header>
            <h1>风变野菩萨AI视频社团A班 · 资讯中心</h1>
            <p>每周/月社群资讯汇总，让你不错过任何重要信息</p>
        </header>

        <main>
            <h2 class="section-title">📚 资讯列表</h2>
            <ul class="digest-list">
                <li>
                    <a href="weekly-digest-2026-01-19-2026-02-19.html">
                        <span class="date">2026年1月19日 - 2月19日</span>
                        <span class="desc">本月社群综合资讯，涵盖荣誉时刻、技能干货、热议话题等精彩内容</span>
                        <div class="stats">
                            <span>3000 条消息</span>
                            <span>135 位社员</span>
                            <span>高质量讨论 200+</span>
                        </div>
                    </a>
                </li>
                <li>
                    <a href="weekly-digest-2026-02-12-2026-02-19.html">
                        <span class="date">2026年2月12日 - 2月19日</span>
                        <span class="desc">本周社群资讯速览</span>
                        <div class="stats">
                            <span>381 条消息</span>
                            <span>55 位社员</span>
                        </div>
                    </a>
                </li>
            </ul>
        </main>

        <footer>
            <p>风变野菩萨AI视频社团A班 · 资讯中心</p>
        </footer>
    </div>
</body>
</html>
