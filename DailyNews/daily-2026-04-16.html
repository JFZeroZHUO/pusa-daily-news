<!DOCTYPE html>
<html lang="zh-CN" data-theme="dark">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>风变野菩萨AI视频社团A班 · 日报 2026-04-16</title>
  <style>
    :root {
      /* ===== 星期四：星空紫配色 ===== */
      --bg-primary:    #13111a;
      --bg-card:       #1a1725;
      --bg-card-hover: #231f30;
      --border:        #3d3654;
      --text-primary:  #f0e6fa;
      --text-secondary:#9f8fbf;
      --accent-primary:#9f7aea;
      --accent-red:    #f687b3;
      --accent-green:  #68d391;
      --accent-purple: #d6bcfa;
      --accent-orange: #fbd38d;
      --accent-yellow: #f6e05e;
      --gradient-title: linear-gradient(90deg, #9f7aea, #805ad5);

      /* ===== 字体大小系统 ===== */
      --font-base:        16px;
      --font-xs:          14px;
      --font-sm:          15px;
      --font-md:          16px;
      --font-lg:          18px;
      --font-xl:          21px;
      --font-2xl:         27px;
      --font-3xl:         31px;
      --font-data:        23px;
    }

    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", "Noto Sans SC", sans-serif;
      background: var(--bg-primary);
      color: var(--text-primary);
      font-size: var(--font-base);
      line-height: 1.7;
      min-height: 100vh;
    }

    /* ===== 报头 ===== */
    .newspaper-header {
      background: linear-gradient(135deg, #1a1725 0%, #231f30 100%);
      padding: 40px 30px;
      border-bottom: 3px solid var(--accent-primary);
      position: relative;
      overflow: hidden;
    }

    .newspaper-header::before {
      content: '';
      position: absolute;
      top: -50%;
      right: -10%;
      width: 400px;
      height: 400px;
      background: radial-gradient(circle, rgba(159,122,234,0.15) 0%, transparent 70%);
      border-radius: 50%;
    }

    .header-top {
      max-width: 1600px;
      margin: 0 auto;
      text-align: center;
      position: relative;
      z-index: 1;
    }

    .issue-info {
      font-size: var(--font-xs);
      color: var(--accent-purple);
      letter-spacing: 2px;
      text-transform: uppercase;
      margin-bottom: 15px;
    }

    .newspaper-title {
      font-size: var(--font-3xl);
      font-weight: 900;
      background: var(--gradient-title);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
      margin-bottom: 15px;
      letter-spacing: 4px;
    }

    .stats-badge {
      display: inline-block;
      background: rgba(159,122,234,0.15);
      border: 1px solid var(--accent-primary);
      padding: 6px 18px;
      border-radius: 20px;
      font-size: var(--font-xs);
      color: var(--accent-purple);
    }

    .header-divider {
      height: 2px;
      background: linear-gradient(90deg, transparent, var(--accent-primary), transparent);
      margin-top: 25px;
    }

    /* ===== 主布局 ===== */
    .newspaper-grid {
      max-width: 1600px;
      margin: 30px auto;
      display: grid;
      grid-template-columns: 25% 45% 28%;
      gap: 2%;
      padding: 0 20px;
    }

    @media (max-width: 1200px) {
      .newspaper-grid {
        grid-template-columns: 1fr;
      }
    }

    /* ===== 板块通用样式 ===== */
    .block {
      background: var(--bg-card);
      border: 1px solid var(--border);
      border-radius: 12px;
      padding: 20px;
      margin-bottom: 20px;
      transition: all 0.3s ease;
    }

    .block:hover {
      border-color: var(--accent-primary);
      box-shadow: 0 4px 20px rgba(159,122,234,0.15);
    }

    .block-title {
      font-size: var(--font-lg);
      font-weight: 700;
      margin-bottom: 18px;
      display: flex;
      align-items: center;
      gap: 10px;
    }

    .block-title .icon {
      font-size: var(--font-xl);
    }

    /* ===== 重要公告 ===== */
    .announcement-item {
      position: relative;
      padding-left: 20px;
      margin-bottom: 15px;
      border-left: 2px solid var(--accent-red);
    }

    .announcement-time {
      font-size: var(--font-xs);
      color: var(--accent-red);
      margin-bottom: 5px;
    }

    .announcement-content {
      font-size: var(--font-sm);
      color: var(--text-secondary);
    }

    /* ===== 师说 ===== */
    blockquote {
      border-left: 3px solid var(--accent-purple);
      padding: 12px 18px;
      margin: 15px 0;
      background: rgba(214,188,250,0.08);
      color: var(--text-primary);
      font-style: italic;
      border-radius: 0 8px 8px 0;
    }

    .teacher-name {
      font-weight: 700;
      color: var(--accent-purple);
      margin-bottom: 5px;
    }

    .analysis-box {
      background: rgba(159,122,234,0.08);
      border: 1px dashed var(--accent-primary);
      padding: 12px 16px;
      border-radius: 8px;
      margin-top: 12px;
      font-size: var(--font-sm);
    }

    .analysis-box strong {
      color: var(--accent-purple);
    }

    /* ===== 热议话题 ===== */
    .hot-topic {
      margin-bottom: 20px;
      padding-bottom: 15px;
      border-bottom: 1px solid var(--border);
    }

    .hot-topic:last-child {
      border-bottom: none;
    }

    .hot-topic-title {
      font-size: var(--font-lg);
      font-weight: 700;
      color: var(--accent-primary);
      margin-bottom: 10px;
    }

    .heat-stats {
      font-size: var(--font-xs);
      color: var(--accent-orange);
      margin-bottom: 12px;
    }

    .chat-bubble {
      background: rgba(159,122,234,0.1);
      padding: 10px 14px;
      border-radius: 18px;
      margin-bottom: 8px;
      font-size: var(--font-md);
    }

    .bubble-sender {
      font-size: var(--font-xs);
      color: var(--accent-purple);
      font-weight: 600;
      margin-bottom: 3px;
    }

    /* ===== 荣誉时刻 ===== */
    .honor-item {
      background: linear-gradient(135deg, rgba(246,224,94,0.1), rgba(246,224,94,0.05));
      border: 1px solid rgba(246,224,94,0.3);
      padding: 15px;
      border-radius: 10px;
      margin-bottom: 12px;
    }

    .honor-icon {
      font-size: var(--font-2xl);
      margin-bottom: 8px;
    }

    .honor-name {
      font-size: var(--font-md);
      font-weight: 700;
      color: var(--accent-yellow);
    }

    .honor-prize {
      font-size: var(--font-md);
      color: var(--accent-green);
      margin-top: 5px;
    }

    /* ===== AI资讯 ===== */
    .ai-item {
      background: rgba(251,211,141,0.08);
      border-left: 3px solid var(--accent-orange);
      padding: 12px 16px;
      margin-bottom: 10px;
      border-radius: 0 6px 6px 0;
      font-size: var(--font-sm);
    }

    .ai-tool-tag {
      display: inline-block;
      background: var(--accent-orange);
      color: #1a1725;
      font-size: var(--font-xs);
      padding: 3px 10px;
      border-radius: 12px;
      font-weight: 600;
      margin-bottom: 8px;
    }

    .ai-data-number {
      font-size: var(--font-data);
      font-weight: 900;
      color: var(--accent-orange);
    }

    .link-pill {
      display: inline-block;
      padding: 4px 12px;
      border-radius: 20px;
      border: 1px solid var(--accent-primary);
      color: var(--accent-purple);
      font-size: var(--font-xs);
      text-decoration: none;
      margin-top: 8px;
      transition: all 0.2s;
    }

    .link-pill:hover {
      background: var(--accent-primary);
      color: white;
    }

    /* ===== 社群动态 ===== */
    .community-card {
      background: rgba(159,122,234,0.05);
      padding: 12px;
      border-radius: 10px;
      margin-bottom: 10px;
      font-size: var(--font-sm);
    }

    .community-speaker {
      font-size: var(--font-xs);
      color: var(--accent-purple);
      font-weight: 600;
      margin-bottom: 5px;
    }

    /* ===== 页脚 ===== */
    footer {
      text-align: center;
      padding: 30px 20px;
      border-top: 1px solid var(--border);
      color: var(--text-secondary);
      font-size: var(--font-xs);
    }

    /* ===== 空状态 ===== */
    .empty-state {
      color: var(--text-secondary);
      font-size: var(--font-sm);
      text-align: center;
      padding: 30px;
      font-style: italic;
    }
  </style>
</head>
<body>
  <!-- 报头 -->
  <header class="newspaper-header">
    <div class="header-top">
      <span class="issue-info">第240期 · 2026年04月16日 星期四</span>
      <h1 class="newspaper-title">野菩萨AI社团 · 每日资讯</h1>
      <span class="stats-badge">今日 0 条消息 · 0 人发言</span>

  <!-- 三栏主体 -->
  <main class="newspaper-grid">

    </aside>
  </main>

  <!-- 页脚 -->
  <footer>
    <p>风变野菩萨AI视频社团A班 · 每日资讯 · 生成时间：2026-04-17 12:00:00</p>
  </footer>
</body>
</html>
