    :root {

      --bg-card: #16243d;
      --bg-card-hover: #1d3154;
      --border: #2a406a;
      --text-primary: #e9f1ff;
      --text-secondary: #8ea6d4;
      --accent: #6ea8fe;
      --accent-soft: rgba(110, 168, 254, 0.2);
      --danger-soft: rgba(255, 99, 99, 0.14);
      --shell-header-bg: rgba(8, 16, 29, 0.75);
      --shell-sidebar-bg: rgba(8, 16, 29, 0.95);
    }

    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    html, body {
      width: 100%;
      height: 100%;
    }

    body {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, "PingFang SC", "Microsoft YaHei", sans-serif;
      background: radial-gradient(circle at 0 0, #11203d 0%, var(--bg-page) 55%);
      color: var(--text-primary);
      overflow: hidden;
    }

    .layout {
      display: grid;
      grid-template-columns: 124px 1fr;
      height: 100vh;
      transition: grid-template-columns 0.2s ease;
    }

    body.sidebar-collapsed .layout {
      grid-template-columns: 18px 1fr;
    }

    .sidebar {
      border-right: 1px solid var(--border);
      background: var(--shell-sidebar-bg);
      padding: 8px 4px 8px 6px;
      display: flex;
      flex-direction: column;
      gap: 6px;
      overflow: visible;
      transition: padding 0.2s ease, border-color 0.2s ease;
      position: relative;
      margin-top: 74px;
      height: calc(100vh - 74px);
    }

    body.sidebar-collapsed .toc {
      display: none;
    }

    body.sidebar-collapsed .sidebar {
      border-right-color: transparent;
      padding: 0;
    }

    .sidebar-handle {
      position: absolute;
      right: -23px;
      top: 50%;
      transform: translateY(-50%);
      width: 23px;
      height: 132px;
      border: 1px solid var(--border);
      border-left: none;
      border-radius: 0 9px 9px 0;
      background: var(--bg-panel);
      color: var(--text-primary);
      cursor: pointer;
      writing-mode: vertical-rl;
      text-orientation: upright;
      letter-spacing: 2px;
      font-size: 12px;
      line-height: 1;
      padding: 8px 2px;
      transition: 0.2s;
      z-index: 5;
    }

    .sidebar-handle:hover {
      border-color: var(--accent);
      background: var(--bg-card-hover);
    }

    .toc {
      flex: 1;
      overflow-y: auto;
      padding-right: 0;
    }

    .toc::-webkit-scrollbar {
      width: 8px;
    }

    .toc::-webkit-scrollbar-thumb {
      background: #253b60;
      border-radius: 999px;
    }

    .month-block {
      margin-bottom: 0;
      border: none;
      border-radius: 0;
      background: transparent;
      overflow: visible;
    }

    .month-toggle {
      width: 100%;
      border: none;
      background: transparent;
      color: var(--text-primary);
      display: flex;
      align-items: center;
      justify-content: flex-start;
      gap: 6px;
      padding: 6px 4px;
      cursor: pointer;
      font-size: 14px;
      font-weight: 600;
      transition: background 0.2s;
      border-radius: 4px;
    }

    .month-toggle:hover {
      background: rgba(255, 255, 255, 0.06);
    }

    .month-left {
      display: inline-flex;
      align-items: center;
      gap: 8px;
    }

    .month-arrow {
      color: var(--accent);
      font-size: 16px;
      width: 12px;
      text-align: center;
      line-height: 1;
    }

    .month-list {
      border-top: none;
      padding: 0 0 2px 8px;
      display: grid;
      gap: 0;
    }

    .month-list.collapsed {
      display: none;
    }

    .digest-item {
      width: 100%;
      border: none;
      background: transparent;
      color: var(--text-secondary);
      border-radius: 0;
      text-align: left;
      padding: 4px 4px 4px 14px;
      cursor: pointer;
      transition: 0.2s;
      position: relative;
      font-size: 13px;
    }

    .digest-item:hover {
      color: var(--text-primary);
      background: rgba(255, 255, 255, 0.04);
    }

    .digest-item.active {
      color: var(--accent);
      background: rgba(110, 168, 254, 0.1);
      font-weight: 600;
    }

    .digest-item .date {
      display: block;
      font-size: 13px;
      line-height: 1.35;
      text-indent: 3ch;
    }

    .digest-item::before {
      content: "";
      position: absolute;
      left: calc(6px + 3ch);
      top: 50%;
      width: 4px;
      height: 4px;
      border-radius: 50%;
      transform: translateY(-50%);
      background: currentColor;
      opacity: 0.75;
    }

    .viewer {
      display: flex;
      flex-direction: column;
      min-width: 0;
      margin-top: 74px;
      height: calc(100vh - 74px);
    }

    .viewer-head {
      height: 74px;
      border-bottom: 1px solid var(--border);
      background: var(--shell-header-bg);
      position: fixed;
      top: 0;
      left: 0;
      right: 0;
      width: 100vw;
      z-index: 20;
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 16px;
      padding: 12px 20px;
    }

    .viewer-meta h2 {
      font-size: 36px;
      line-height: 1.2;
      margin-bottom: 4px;
      word-break: break-word;
    }

    .viewer-meta p {
      font-size: 12px;
      color: var(--text-secondary);
      position: absolute;
      left: 50%;
      top: 50%;
      transform: translate(-50%, -50%);
      text-align: center;
      white-space: nowrap;
      margin: 0;
      pointer-events: none;
    }

    .viewer-nav {
      display: inline-flex;
      gap: 10px;
      flex-shrink: 0;
      align-items: center;
    }

    .viewer-search {
      position: relative;
      width: 320px;
      max-width: 40vw;
    }

    .search-input {
      width: 100%;
      height: 36px;
      border-radius: 9px;
      border: 1px solid var(--border);
      background: var(--bg-panel);
      color: var(--text-primary);
      font-size: 13px;
      padding: 0 12px;
      outline: none;
    }

    .search-input:focus {
      border-color: var(--accent);
      box-shadow: 0 0 0 3px rgba(110, 168, 254, 0.15);
    }

    .search-results {
      position: absolute;
      top: calc(100% + 8px);
      left: 0;
      right: 0;
      max-height: 340px;
      overflow-y: auto;
      background: rgba(14, 25, 44, 0.98);
      border: 1px solid var(--border);
      border-radius: 10px;
      box-shadow: 0 10px 32px rgba(0, 0, 0, 0.35);
      display: none;
      z-index: 50;
    }

    .search-results.show {
      display: block;
    }

    .search-item {
      width: 100%;
      border: none;
      border-bottom: 1px solid rgba(142, 166, 212, 0.15);
      background: transparent;
      color: var(--text-primary);
      text-align: left;
      cursor: pointer;
      padding: 9px 10px;
      transition: 0.2s;
    }

    .search-item:last-child {
      border-bottom: none;
    }

    .search-item:hover {
      background: rgba(255, 255, 255, 0.07);
    }

    .search-meta {
      font-size: 11px;
      color: var(--text-secondary);
      margin-bottom: 4px;
    }

    .search-snippet {
      font-size: 12px;
      line-height: 1.45;
      color: #d9e8ff;
    }

    .search-snippet mark,
    .digest-highlight {
      background: #ffe066;
      color: #10213f;
      border-radius: 3px;
      padding: 0 2px;
    }

    .search-empty {
      padding: 11px 10px;
      color: var(--text-secondary);
      font-size: 12px;
    }

    .nav-btn {
      height: 36px;
      min-width: 88px;
      border-radius: 9px;
      border: 1px solid var(--border);
      background: var(--bg-panel);
      color: var(--text-primary);
      font-size: 13px;
      cursor: pointer;
      transition: 0.2s;
    }

    .nav-btn:hover:not(:disabled) {
      border-color: var(--accent);
      color: #fff;
      background: var(--bg-card-hover);
    }

    .nav-btn:disabled {
      cursor: not-allowed;
      opacity: 0.45;
    }

    .viewer-frame-wrap {
      position: relative;
      flex: 1;
      min-height: 0;
      background: #0c1527;
    }

    #digestFrame {
      width: 100%;
      height: 100%;
      border: none;
      background: #fff;
    }

    .frame-error {
      position: absolute;
      inset: 0;
      display: none;
      align-items: center;
      justify-content: center;
      text-align: center;
      color: #ffd4d4;
      background: var(--danger-soft);
      padding: 20px;
      font-size: 14px;
      line-height: 1.6;
    }

    @media (max-width: 1100px) {
      .layout {
        grid-template-columns: 112px 1fr;
      }
      .viewer-meta h2 {
        font-size: 17px;
      }
    }

    @media (max-width: 900px) {
      body {
        overflow: auto;
      }
      .layout {
        display: flex;
        flex-direction: column;
        height: auto;
        min-height: 100vh;
      }
      .sidebar {
        height: calc(52vh - 74px);
        border-right: none;
        border-bottom: 1px solid var(--border);
      }
      body.sidebar-collapsed .layout {
        grid-template-columns: 1fr;
      }
      .viewer {
        min-height: 48vh;
      }
      .viewer-nav {
        flex-wrap: wrap;
        justify-content: flex-end;
      }
      .viewer-search {
        width: 100%;
        max-width: none;
      }
    }
  </style>
</head>
