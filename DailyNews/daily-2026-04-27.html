<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>风变野菩萨AI视频社团A班 · 日报 2026-04-27</title>
  <style>
    :root {
      /* ===== 配色系统：星期一深空蓝 ===== */
      --bg-primary:    #0a0e14;
      --bg-card:       #11151c;
      --bg-card-hover: #1a1f2a;
      --border:        #2d3748;
      --text-primary:  #e2e8f0;
      --text-secondary:#718096;
      --accent-primary:#63b3ed;
      --accent-red:    #fc8181;
      --accent-green:  #68d391;
      --accent-purple: #b794f4;
      --accent-orange: #f6ad55;
      --accent-yellow: #ecc94b;
      --gradient-title: linear-gradient(90deg, #63b3ed, #4299e1);

      /* ===== 字体大小系统 ===== */
      --font-base:     16px;
      --font-xs:       14px;
      --font-sm:       15px;
      --font-md:       16px;
      --font-lg:       18px;
      --font-xl:       21px;
      --font-2xl:      27px;
      --font-3xl:      31px;
      --font-data:     23px;
    }

    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, "Helvetica Neue", Arial, sans-serif;
      background: var(--bg-primary);
      color: var(--text-primary);
      font-size: var(--font-base);
      line-height: 1.6;
      min-height: 100vh;
    }

    /* 报头 */
    .newspaper-header {
      background: linear-gradient(135deg, #0d1117 0%, #161b22 100%);
      padding: 30px 40px;
      border-bottom: 3px solid var(--accent-primary);
      text-align: center;
    }

    .header-top {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 15px;
    }

    .issue-info {
      font-size: var(--font-xs);
      color: var(--accent-primary);
      font-weight: 600;
      letter-spacing: 1px;
    }

    .newspaper-title {
      font-size: var(--font-3xl);
      background: var(--gradient-title);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
      font-weight: 800;
      letter-spacing: 2px;
    }

    .stats-badge {
      font-size: var(--font-xs);
      background: rgba(99, 179, 237, 0.15);
      padding: 5px 15px;
      border-radius: 20px;
      border: 1px solid var(--accent-primary);
    }

    .header-divider {
      height: 2px;
      background: linear-gradient(90deg, transparent, var(--accent-primary), transparent);
      margin-top: 20px;
    }

    /* 三栏布局 */
    .newspaper-grid {
      display: grid;
      grid-template-columns: 25% 45% 28%;
      gap: 2%;
      max-width: 1600px;
      margin: 0 auto;
      padding: 30px 40px;
    }

    @media (max-width: 1200px) {
      .newspaper-grid {
        grid-template-columns: 1fr;
      }
    }

    /* 通用板块样式 */
    .block-section {
      background: var(--bg-card);
      border-radius: 12px;
      padding: 20px;
      margin-bottom: 20px;
      border: 1px solid var(--border);
      transition: all 0.3s ease;
    }

    .block-section:hover {
      border-color: var(--accent-primary);
      box-shadow: 0 4px 20px rgba(99, 179, 237, 0.1);
    }

    .block-title {
      font-size: var(--font-lg);
      font-weight: 700;
      margin-bottom: 15px;
      display: flex;
      align-items: center;
      gap: 8px;
    }

    .block-title .icon {
      font-size: var(--font-xl);
    }

    /* 引用样式 */
    blockquote {
      border-left: 3px solid var(--accent-purple);
      padding: 12px 20px;
      margin: 15px 0;
      background: rgba(183, 148, 244, 0.08);
      color: var(--text-primary);
      font-style: italic;
      font-size: var(--font-sm);
      border-radius: 0 8px 8px 0;
    }

    /* 强调样式 */
    .highlight-blue { color: var(--accent-primary); font-weight: 700; }
    .highlight-red { color: var(--accent-red); font-weight: 700; }
    .highlight-green { color: var(--accent-green); font-weight: 700; }
    .bg-highlight { background: rgba(99, 179, 237, 0.15); padding: 2px 8px; border-radius: 4px; }

    /* 链接胶囊 */
    .link-pill {
      display: inline-block;
      padding: 4px 12px;
      border-radius: 20px;
      border: 1px solid var(--accent-primary);
      color: var(--accent-primary);
      font-size: var(--font-xs);
      text-decoration: none;
      margin: 5px 5px 5px 0;
      transition: all 0.3s;
    }

    .link-pill:hover {
      background: var(--accent-primary);
      color: var(--bg-primary);
    }

    /* 重要公告 */
    .block-announcement {
      border-top: 3px solid var(--accent-red);
    }

    .announcement-item {
      padding: 12px;
      margin: 10px 0;
      background: rgba(252, 129, 129, 0.05);
      border-left: 3px solid var(--accent-red);
      border-radius: 0 8px 8px 0;
    }

    .announcement-time {
      font-size: var(--font-xs);
      color: var(--accent-red);
      font-weight: 600;
    }

    /* 师说 */
    .block-teacher {
      background: linear-gradient(135deg, rgba(183, 148, 244, 0.08), rgba(183, 148, 244, 0.03));
      border: 1px solid rgba(183, 148, 244, 0.3);
    }

    .teacher-quote {
      font-size: var(--font-md);
      line-height: 1.8;
      margin: 15px 0;
    }

    /* 热议话题 */
    .hot-topic-title {
      font-size: var(--font-lg);
      font-weight: 700;
      margin: 15px 0 10px;
      color: var(--accent-primary);
    }

    .chat-bubble {
      background: var(--bg-card-hover);
      padding: 12px 16px;
      border-radius: 18px;
      margin: 10px 0;
      position: relative;
    }

    .bubble-sender {
      font-size: var(--font-xs);
      color: var(--accent-primary);
      font-weight: 600;
      margin-bottom: 5px;
    }

    .heat-stats {
      font-size: var(--font-xs);
      background: var(--accent-red);
      color: white;
      padding: 3px 10px;
      border-radius: 12px;
      display: inline-block;
      margin-bottom: 10px;
    }

    /* 荣誉时刻 */
    .honor-item {
      display: flex;
      align-items: center;
      gap: 15px;
      padding: 15px;
      margin: 10px 0;
      background: rgba(236, 201, 75, 0.08);
      border: 1px solid var(--accent-yellow);
      border-radius: 10px;
    }

    .honor-icon {
      font-size: var(--font-2xl);
      text-shadow: 0 0 20px rgba(236, 201, 75, 0.5);
    }

    .honor-name {
      font-size: var(--font-md);
      font-weight: 700;
      color: var(--accent-yellow);
    }

    /* AI资讯 */
    .ai-item {
      padding: 12px;
      margin: 10px 0;
      background: var(--bg-card-hover);
      border: 1px solid var(--border);
      border-radius: 8px;
      font-size: var(--font-sm);
    }

    .ai-tool-tag {
      display: inline-block;
      background: var(--accent-orange);
      color: var(--bg-primary);
      padding: 3px 10px;
      border-radius: 6px;
      font-size: var(--font-xs);
      font-weight: 600;
      margin-right: 8px;
    }

    .ai-data-number {
      font-size: var(--font-data);
      font-weight: 800;
      color: var(--accent-orange);
    }

    /* 社群动态 */
    .community-card {
      background: var(--bg-card-hover);
      padding: 15px;
      margin: 10px 0;
      border-radius: 10px;
      border: 1px solid var(--border);
      font-size: var(--font-sm);
    }

    .community-speaker {
      font-size: var(--font-xs);
      color: var(--accent-primary);
      font-weight: 600;
      margin-bottom: 5px;
    }

    /* 页脚 */
    footer {
      text-align: center;
      padding: 25px;
      border-top: 1px solid var(--border);
      font-size: var(--font-xs);
      color: var(--text-secondary);
    }

    /* 分析框 */
    .analysis-box {
      background: rgba(99, 179, 237, 0.08);
      border-left: 3px solid var(--accent-primary);
      padding: 15px 20px;
      margin: 15px 0;
      border-radius: 0 8px 8px 0;
      font-size: var(--font-sm);
    }

    .analysis-title {
      font-weight: 700;
      color: var(--accent-primary);
      margin-bottom: 8px;
    }
  </style>
</head>
<body>

  </main>

  <footer>

</body>
